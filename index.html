<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NetVeil</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #050816;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      width: 500px;
      background: #0b1224;
      border: 1px solid #1e2b4d;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 0 25px rgba(0, 140, 255, 0.08);
    }

    .title {
      font-size: 22px;
      margin-bottom: 20px;
      color: #7fb3ff;
    }

    .status {
      font-size: 18px;
      color: #8b9bb4;
    }

    .dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      background: #00ff88;
      border-radius: 50%;
      margin-right: 10px;
    }
  </style>
</head>

<body>

  <div class="card">
    <div class="title">
      Демо-ключ — ограниченный доступ
    </div>

    <div class="status">
      <span class="dot"></span>
      в разработке
    </div>
  </div>

</body>
</html>
